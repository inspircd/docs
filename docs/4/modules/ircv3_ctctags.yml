name: ircv3_ctctags

description: |-
  This module provides the IRCv3 `message-tags` client capability.

configuration:
- name: ctctags
  description: |-
    The `<ctctags>` tag defines settings about how the ircv3_ctctags module should behave. This tag can only be defined once.
  attributes:
  - name: allowclientonlytags
    type: Boolean
    required: false
    default: 'Yes'
    description: |-
      *Deprecated in v4.10.0!* Whether to allow clients to send client-only tags. You should use `clientonlytags` instead of this.
  - name: clientonlytags
    type: Text
    required: false
    default: all
    added: 4.10.0
    description: |-
      What client-only tags to allow clients to send.

  details: |-
    The clientonlytags field should be set to one of the following values:

    Value | Description
    ----- | -----------
    all   | [**New in v4.10.0!**](/4/change-log/#inspircd-4100) Allow all client-only tags.
    known | [**New in v4.10.0!**](/4/change-log/#inspircd-4100) Allow known client-only tags.
    none  | [**New in v4.10.0!**](/4/change-log/#inspircd-4100) Do not allow client-only tags.

  example: |-
    ```xml
    <ctctags clientonlytags="all">
    ```

commands:
- name: TAGMSG
  param_count: 1
  syntax: <target>
  description: |-
    Sends a message containing only tags to the specified target.
  # TAGMSG is not documented here because it is not intended to be executed by users

client_caps:
- name: '[message-tags](https://ircv3.net/specs/extensions/message-tags.html)'
  description: |-
    Enables support for sending and receiving `TAGMSG` messages.
