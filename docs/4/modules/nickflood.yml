name: nickflood

description: |-
  This module adds channel mode `F` (nickflood) which helps protect against spammers which mass-change nicknames.

configuration:
- name: nickflood
  description: |-
    The `<nickflood>` tag defines settings about how the nickflood module should behave. This tag can only be defined once.
  attributes:
  - name: duration
    type: Duration
    required: false
    default: 1m
    description: |-
      The time period that nick changes should be locked for once a nick flood has been detected.
  - name: notifyrank
    type: Number
    required: false
    default: 0
    added: 4.11.0
    description: |-
      The lowest prefix rank that can receive a notification that a nick flood has been detected.
  details: |+
    The notifyrank field should be set to one of the following values:

    Value    | Description
    -------- | -----------
    0        | All users on the channel can receive nick flood messages.
    10000    | Users with channel prefix mode `v` (voice) and above can receive nick flood messages.
    30000    | Users with channel prefix mode `o` (op) and above can receive nick flood messages.
    *custom* | Users with a channel prefix mode created by [the customprefix module](/4/modules/customprefix) can receive nick flood messages.
  example: |-
    ```xml
    <nickflood duration="1m"
               notifyrank="0">
    ```

chmodes:
  chars:
  - name: nickflood
    char: F
    type: Parameter
    syntax: <changes>:<seconds>
    usable_by: Channel operators
    description: |-
      Prevents more than &lt;changes&gt; nickname changes in the last &lt;seconds&gt; seconds.
  example:
  - description: |-
      Prevents more than three nickname changes in the last five seconds
    text: |-
      /MODE #channel +F 3:5

exemptions:
- name: nickflood
  description: Allows exempted users to change nicknames at a higher rate than channel mode `F` (nickflood) allows.
