name: serverban

description: |-
  This module adds extended ban `s:` (server) which check whether users are on a server matching the specified glob pattern.

configuration:
- name: serverban
  description: |-
    The `<serverban>` tag defines settings about how the serverban module should behave. This tag can only be defined once.
  attributes:
  - name: operonly
    type: Boolean
    required: false
    default: 'No'
    added: 4.10.0
    description: |-
      Whether extended ban `s:` (server) can only be set by server operators.
  details: ""
  example: |-
    ```xml
    <serverban operonly="no">
    ```

extbans:
  description: ""
  chars:
  - name: server
    char: s
    type: Matching
    syntax: <pattern>
    description: Checks whether users are on a server matching &lt;pattern&gt;.
  example:
  - description: |-
      Bans users on irc2.example.com from joining the channel
    text: |-
      /MODE #channel +b server:irc2.example.com
